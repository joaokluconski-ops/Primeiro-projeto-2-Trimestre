<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Top 3 Pokémon</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: gold;
        }

        .pokemon {
            background-color: #2d2d44;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .pokemon img {
            width: 200px;
            height: auto;
            margin-top: 10px;
        }

        .posicao {
            color: gold;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🔥 Meu Top 5 Pokémon Mais Fodas 🔥</h1>

    <div class="pokemon">
        <div class="posicao">🥇 1º Lugar</div>
        <h2>Garchomp</h2>
        <img src="./img/image.png" alt="Garchomp">
    </div>

    <div class="pokemon">
        <div class="posicao">🥈 2º Lugar</div>
        <h2>Regigigas</h2>
        <img src="./img/image copy.png" alt="Regigigas">
    </div>

    <div class="pokemon">
        <div class="posicao">🥉 3º Lugar</div>
        <h2>Dragapult</h2>
        <img src="./img/image copy 2.png" alt="Dragapult">
    </div>
<div class="pokemon">
        <div class="posicao"> 4º Lugar</div>
        <h2>Zygarde</h2>
        <img src="./image/zygarde.jpeg" alt="Zygarde>
    </div>

</body>
</html>
